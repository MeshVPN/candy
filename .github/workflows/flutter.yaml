name: flutter

# UI 客户端发布（当前仅 macOS）。
# 架构：Flutter GUI(普通用户) --HTTP--> candy-service(特权 daemon) --> candy 核心建 utun。
# runner 流程：① 编 candy-service 二进制（CMake）② flutter build macos 出产物
# ③ 把 candy-service 塞进 App 资源目录并内嵌依赖 ④ 打成 DMG 上传。
# App 内首次连接时用 osascript 提权把 candy-service 装成 LaunchDaemon 常驻。
# push 到 master/api 做冒烟构建；release published 时把产物挂到 Release。
#
# 注意：macos/ 平台工程（含定制 entitlements：关沙盒、开出站网）已提交进仓库，
# CI 不再执行 flutter create，避免覆盖这些定制。
#
# Windows/Linux：新架构的提权安装（Windows UAC/服务、Linux pkexec/setcap）与平台
# 工程尚未实现，旧的 FFI 版本 job 已移除，避免产出「能装但连不上」的坏包。待其
# 提权方案设计验证后再补回对应 job。

on:
  push:
    branches: [master, api]
    paths:
      - 'clients/flutter/**'
      - 'candy/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/flutter.yaml'
  release:
    types: [published]
  workflow_dispatch:

env:
  FLUTTER_DIR: clients/flutter

jobs:
  # ------------------------------- macOS -------------------------------
  macos:
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: depends
        run: brew update && brew install fmt poco spdlog ninja
      - name: setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: build candy-service
        run: |
          if [ "$RUNNER_ARCH" == "ARM64" ]; then
            export CPATH=/opt/homebrew/include
            export LIBRARY_PATH=/opt/homebrew/lib
          else
            export CPATH=/usr/local/include
            export LIBRARY_PATH=/usr/local/lib
          fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCANDY_NETSTACK=ON
          cmake --build build --target candy-service
      - name: flutter build macos
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          flutter pub get
          flutter build macos --release
      - name: bundle candy-service into app
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1)
          echo "app bundle: $APP"
          RES="$APP/Contents/Resources"
          FW="$APP/Contents/Frameworks"
          mkdir -p "$RES" "$FW"
          # candy-service 由 App 提权装成 daemon，二进制随包放 Resources/。
          cp "$GITHUB_WORKSPACE/build/candy-service/candy-service" "$RES/candy-service"
          chmod +x "$RES/candy-service"
          # candy-service 硬链了一串 Homebrew 的 Poco/openssl 绝对路径依赖，目标机没装
          # Homebrew 会加载失败。把这些依赖递归内嵌进 Frameworks/ 并改写为 @rpath，
          # 并给 candy-service 补一条指向 Frameworks 的 LC_RPATH，使其自包含。
          "$GITHUB_WORKSPACE/scripts/bundle-macos-deps.sh" "$RES/candy-service" "$FW"
          install_name_tool -add_rpath "@executable_path/../Frameworks" "$RES/candy-service" || true
          # 改依赖会使各库签名失效，直接运行会报“已损坏”。重新 ad-hoc 签名：
          # 先逐个签内部 dylib 与 candy-service，再整包封印。
          for dylib in "$FW"/*.dylib; do codesign --force -s - "$dylib"; done
          codesign --force -s - "$RES/candy-service"
          codesign --force --deep -s - "$APP"
          # 打成 DMG 分发（拖入 Applications 的标准体验，比 zip 更规范）。
          mkdir -p "$GITHUB_WORKSPACE/artifact"
          hdiutil create -volname Candy -srcfolder "$APP" -ov -format UDZO \
            "$GITHUB_WORKSPACE/artifact/candy-macos.dmg"
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: candy-ui-macos-${{ github.event.release.tag_name || github.sha }}
          path: artifact/candy-macos.dmg
      - name: set release package name
        if: github.event_name == 'release'
        run: |
          GIT_TAG=${{ github.event.release.tag_name }}
          echo "PKG=candy-ui_${GIT_TAG#v}+macos.dmg" >> $GITHUB_ENV
      - name: rename for release
        if: github.event_name == 'release'
        run: mv artifact/candy-macos.dmg "artifact/${{ env.PKG }}"
      - name: upload release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: artifact/${{ env.PKG }}
